{% set images = data.widget.images | jsonAttribute %}

<div
  data-openstad-carousel
  data-size="{{ data.widget.size }}"
  data-fit="{{ data.widget.fit }}"
  data-title="{{ data.widget.title }}"
  data-images="{{ images }}"
  data-imagesize="{{ data.widget.imageSize | default('full') }}"
  data-fade="{{ data.widget.fade }}"
  data-autoplay="{{ data.widget.autoplay }}"
  data-autoplay-interval="{{ data.widget.autoplayInterval | default(5) }}"></div>
