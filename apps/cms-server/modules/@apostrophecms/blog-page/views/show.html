{% extends "layout.html" %} {% extends data.outerLayout %} {% block title %}{{
data.piece.title }}{% endblock %} {% block main %}

<div class="section news-detail">
  <div class="container u-small-dropdowns">
    <div class="row">
      <div class="col-md-8 col-xs-12">
        <div class="news-detail-header">
          <figure>
            <img
              src="{{ apos.attachment.url(data.piece.image, { size: 'full' }) }}"
              alt="{{ data.piece.image.title or data.piece.title }}" />
          </figure>
        </div>
      </div>

      <div class="col-md-4 col-xs-12">
        <aside class="news-detail-sidebar">
          <div class="publication-date">
            <p class="utrecht-heading-4 share-links__label">Gepubliceerd op</p>
            <p class="utrecht-paragraph">
              <time
                datetime="{{ data.piece.publishedAt | date('YYYY-MM-DD') }}">
                {{ data.piece.publishedAt | date('D MMMM YYYY') }}
              </time>
            </p>
          </div>

          <div class="share-links">
            <p class="utrecht-heading-4 share-links__label">Deel dit</p>
            <ul
              class="link-container"
              role="list"
              aria-label="Deel dit bericht">
              <li>
                <a
                  href="http://www.facebook.com/share.php?u={{ data.piece._url | urlencode }}"
                  aria-label="Deel op Facebook (opent in nieuw venster)"
                  target="_blank"
                  class="utrecht-link-social"
                  rel="external noopener noreferrer"
                  ><i class="icon --facebook" aria-hidden="true"></i
                ></a>
              </li>
              <li>
                <a
                  href="https://x.com/intent/post?text={{ data.piece._url | urlencode }}"
                  aria-label="Deel op X (opent in nieuw venster)"
                  target="_blank"
                  class="utrecht-link-social"
                  rel="external noopener noreferrer"
                  ><i class="icon --twitter" aria-hidden="true"></i
                ></a>
              </li>
              <li>
                <a
                  href="mailto:?subject={{ data.piece.title | urlencode }}&amp;body={{ data.piece._url | urlencode }}"
                  aria-label="Deel via e-mail"
                  class="utrecht-link-social"
                  rel="external noopener noreferrer"
                  ><i class="icon --mail" aria-hidden="true"></i
                ></a>
              </li>
              <li>
                <a
                  href="https://api.whatsapp.com/send?text={{ data.piece._url | urlencode }}"
                  aria-label="Deel op WhatsApp (opent in nieuw venster)"
                  target="_blank"
                  class="utrecht-link-social"
                  rel="external noopener noreferrer"
                  ><i class="icon --whatsapp" aria-hidden="true"></i
                ></a>
              </li>
              <li>
                <a
                  href="https://www.linkedin.com/sharing/share-offsite/?url={{ data.piece._url | urlencode }}"
                  aria-label="Deel op LinkedIn (opent in nieuw venster)"
                  target="_blank"
                  class="utrecht-link-social"
                  rel="external noopener noreferrer"
                  ><i class="icon --linkedin" aria-hidden="true"></i
                ></a>
              </li>
              <li>
                <button
                  type="button"
                  aria-label="Kopieer link naar dit bericht"
                  class="utrecht-link-social copy-link"
                  data-copy-link>
                  <i class="icon --url" aria-hidden="true"></i>
                </button>
              </li>
            </ul>
            <div
              class="visually-hidden"
              aria-live="polite"
              data-copy-status></div>
          </div>
        </aside>
      </div>
    </div>
    <div class="row">
      <div class="col-xs-12">
        <div class="news-detail-title">
          <h1 class="utrecht-heading-1">{{ data.piece.title }}</h1>
        </div>

        <article>{% area data.piece, 'content' %}</article>
      </div>
    </div>
  </div>
</div>

<script>
  (function () {
    var button = document.querySelector('[data-copy-link]');
    var statusEl = document.querySelector('[data-copy-status]');
    if (!button || !navigator.clipboard) return;
    button.addEventListener('click', function () {
      navigator.clipboard.writeText(window.location.href).then(function () {
        button.classList.add('is-copied');
        if (statusEl) {
          statusEl.textContent = 'Link gekopieerd';
        }
        setTimeout(function () {
          button.classList.remove('is-copied');
          if (statusEl) {
            statusEl.textContent = '';
          }
        }, 2000);
      });
    });
  })();
</script>

{% endblock %}
