{{- if eq (toString .Values.api.useKubernetesCronjobs) "true" }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ template "openstad.api.fullname" . }}-cron
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openstad.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ template "openstad.api.fullname" . }}-cron
spec:
  schedule: "*/{{ .Values.api.cronWindowMinutes }} * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: {{ mul (int .Values.api.cronWindowMinutes) 60 }}
      template:
        metadata:
          labels:
            app: {{ .Values.api.label }}-cron
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          serviceAccountName: openstad-headless-ingress-sa
          restartPolicy: OnFailure
          containers:
            - name: {{ template "openstad.api.fullname" . }}-cron
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
              image: {{ .Values.api.deploymentContainer.image }}
              imagePullPolicy: IfNotPresent
              command: ["node", "run-crons.js"]
              volumeMounts:
                - mountPath: /tmp
                  name: tmp-dir
              resources:
{{ toYaml .Values.api.resources | indent 16 }}
              env:
              - name: CRON_WINDOW_MINUTES
                value: "{{ .Values.api.cronWindowMinutes }}"

              - name: URL
                value: https://{{ template "openstad.api.url" . }}

              - name: HOSTNAME
                value: www.{{ .Values.host.base}}

              # MySQL DATABASE
              - name: DB_USERNAME
                valueFrom:
                  secretKeyRef:
                    name: {{ template "openstad.database.credentialsSecret.fullname" . }}
                    key: username

              - name: DB_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: {{ template "openstad.passwordSecret.fullname" . }}
                    key: mysql-password

              - name: DB_HOST
                valueFrom:
                  secretKeyRef:
                    name: {{ template "openstad.database.credentialsSecret.fullname" . }}
                    key: hostname

              - name: DB_PORT
                valueFrom:
                  secretKeyRef:
                    name: {{ template "openstad.database.credentialsSecret.fullname" . }}
                    key: hostport

              - name: DB_MAX_POOL_SIZE
                valueFrom:
                  secretKeyRef:
                    name: {{ template "openstad.database.credentialsSecret.fullname" . }}
                    key: maxPoolSize

              - name: DB_NAME
                valueFrom:
                  secretKeyRef:
                    name: {{ template "openstad.api.secret.fullname" . }}
                    key: {{ .Values.secrets.api.dbNameKey | default "database" }}

              - name: USER_ID_SALT
                valueFrom:
                  secretKeyRef:
                    key: userIdSalt
                    name: {{ template "openstad.api.secret.fullname" . }}

              - name: EMAILADDRESS
                value: {{ .Values.api.emailAddress }}

              - name: PORT
                value: "{{ .Values.api.service.httpPort }}"

              - name: MAIL_FROM
                value: {{ .Values.secrets.mail.api.emailFrom | default "Openstad" }}

              - name: MAIL_TRANSPORTER_TYPE
                valueFrom:
                  secretKeyRef:
                    key: transporterType
                    name: {{ template "openstad.email.secret.fullname" . }}

              - name: MAIL_MICROSOFT_GRAPH_CLIENT_ID
                valueFrom:
                  secretKeyRef:
                    key: msClientId
                    name: {{ template "openstad.email.secret.fullname" . }}

              - name: MAIL_MICROSOFT_GRAPH_CLIENT_SECRET
                valueFrom:
                  secretKeyRef:
                    key: msClientSecret
                    name: {{ template "openstad.email.secret.fullname" . }}

              - name: MAIL_MICROSOFT_GRAPH_TENANT_ID
                valueFrom:
                  secretKeyRef:
                    key: msTenantId
                    name: {{ template "openstad.email.secret.fullname" . }}

              - name: HASH_IP_ADDRESSES
                valueFrom:
                  secretKeyRef:
                    key: hashIpAddresses
                    name: {{ template "openstad.ipaddress.secret.fullname" . }}

              - name: HASH_IP_SALT
                valueFrom:
                  secretKeyRef:
                    key: hashIpSalt
                    name: {{ template "openstad.ipaddress.secret.fullname" . }}

              - name: MAIL_TRANSPORT_SMTP_PORT
                valueFrom:
                  secretKeyRef:
                    key: {{ .Values.secrets.mail.portKey | default "port" }}
                    name: {{ template "openstad.email.secret.fullname" . }}

              - name: MAIL_TRANSPORT_SMTP_HOST
                valueFrom:
                  secretKeyRef:
                    key: {{ .Values.secrets.mail.hostKey | default "host" }}
                    name: {{ template "openstad.email.secret.fullname" . }}

              - name: MAIL_TRANSPORT_SMTP_REQUIRESSL
                value: "true"

              - name: MAIL_TRANSPORT_SMTP_AUTH_USER
                valueFrom:
                  secretKeyRef:
                    key: {{ .Values.secrets.mail.usernameKey | default "username" }}
                    name: {{ template "openstad.email.secret.fullname" . }}

              - name: MAIL_TRANSPORT_SMTP_AUTH_PASS
                valueFrom:
                  secretKeyRef:
                    key: {{ .Values.secrets.mail.passwordKey | default "password" }}
                    name: {{ template "openstad.email.secret.fullname" . }}

              - name: NOTIFICATIONS_ADMIN_EMAILADDRESS
                value: {{ .Values.api.emailAddress }}

              - name: DISABLE_PROJECT_ISSUE_WARNINGS
                value: "{{ .Values.api.disableProjectIssueWarnings }}"

              - name: AUTH_JWTSECRET
                valueFrom:
                  secretKeyRef:
                    key: jwtSecret
                    name: {{ template "openstad.api.secret.fullname" . }}

              - name: AUTH_FIXEDAUTHTOKENS
                valueFrom:
                  secretKeyRef:
                    key: fixedAuthTokens
                    name: {{ template "openstad.api.secret.fullname" . }}

              - name: AUTH_ADAPTER_OPENSTAD_SERVERURL
                value: https://{{ template "openstad.auth.url" . }}

              - name: AUTH_ADAPTER_OPENSTAD_SERVERURL_INTERNAL
                value: http://{{ template "openstad.auth.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.auth.service.httpPort }}

              - name: IMAGE_APP_URL
                value: https://{{ template "openstad.image.url" . }}

              - name: IMAGE_APP_URL_INTERNAL
                value: http://{{ printf "%s.%s.svc.cluster.local:%d" (include "openstad.image.fullname" .) .Release.Namespace (.Values.image.service.httpPort | int) }}

              - name: IMAGE_VERIFICATION_TOKEN
                valueFrom:
                  secretKeyRef:
                    key: verificationToken
                    name: {{ template "openstad.image.secret.fullname" . }}

              - name: NODE_ENV
                value: production

              - name: CMS_URL
                value: https://{{ template "openstad.cms.url" . }}

              - name: BASE_DOMAIN
                value: {{ .Values.host.base }}

              - name: ADMIN_DOMAIN
                value: {{ template "openstad.admin.url" . }}

              - name: KUBERNETES_NAMESPACE
                valueFrom:
                  fieldRef:
                    apiVersion: v1
                    fieldPath: metadata.namespace

              {{- if .Values.api.extraEnvVars }}
              {{- include "common.tplvalues.render" (dict "value" .Values.api.extraEnvVars "context" $) | nindent 14 }}
              {{- end }}
          volumes:
            - name: tmp-dir
              emptyDir: {}
          initContainers:
            - command: ["/bin/bash", "-c"]
              args:
                - nc $DB_HOST $DB_PORT -z -w1
              env:
                - name: DB_HOST
                  valueFrom:
                    secretKeyRef:
                      name: {{ template "openstad.database.credentialsSecret.fullname" . }}
                      key: hostname
                - name: DB_PORT
                  valueFrom:
                    secretKeyRef:
                      name: {{ template "openstad.database.credentialsSecret.fullname" . }}
                      key: hostport
              image: {{ .Values.api.deploymentContainer.image }}
              imagePullPolicy: IfNotPresent
              name: wait-for-db
{{- end }}
