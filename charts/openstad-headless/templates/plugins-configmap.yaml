{{- if .Values.plugins.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openstad.fullname" . }}-plugins
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openstad.labels" . | nindent 4 }}
data:
  plugins.json: |
    {{ dict "plugins" .Values.plugins.items | toJson }}
{{- end }}
